# NBA top 25 — single source of truth.
#
# Schema is enforced in src/content.config.ts. To reorder, edit the `rank:`
# field on any entry (page sorts by rank ascending). `consensusRank:` reflects
# where the broader basketball internet tends to put the player; the page
# renders an arrow showing how far my rank diverges from it.
#
# Consensus baseline: B/R's Top 100 NBA Players of All Time, Ranked
#   https://bleacherreport.com/articles/25223594-brs-top-100-nba-players-all-time-ranked
#
# `blurb:` supports paragraph breaks via blank lines (YAML `>` folds single
# newlines to spaces).
#
# `photo:` is optional — drop a Wikimedia URL when you want to add one.

- id: lebron
  name: LeBron James
  rank: 1
  consensusRank: 2
  era: 2000s–2020s
  teams: [Cleveland Cavaliers, Miami Heat, Los Angeles Lakers]
  accolades:
    - 4× NBA Champion
    - 4× Finals MVP
    - 4× MVP
    - All-time scoring leader
    - 20× All-Star
  blurb: >
    Greatest career of all time. Wherever he went, he won. Greatest floor
    raiser, no question.

- id: jordan
  name: Michael Jordan
  rank: 2
  consensusRank: 1
  era: 1980s–1990s
  teams: [Chicago Bulls, Washington Wizards]
  accolades:
    - 6× NBA Champion
    - 6× Finals MVP
    - 5× MVP
    - 10× scoring champion
    - 14× All-Star
  blurb: >
    Combined freak athleticism with efficient scoring — we all know why he's
    undoubtedly top 2. Having arguably the GOAT coach, sidekick, and running a
    truly game-changing system in the triangle made life a lot easier for him
    than, say, LeBron had.

- id: kareem
  name: Kareem Abdul-Jabbar
  rank: 3
  consensusRank: 3
  era: 1970s–1980s
  teams: [Milwaukee Bucks, Los Angeles Lakers]
  accolades:
    - 6× NBA Champion
    - 2× Finals MVP
    - 6× MVP
    - 19× All-Star
  blurb: >
    Only career to rival LeBron's — he was the best in HS, college, and the
    NBA, plus longevity.

- id: shaq
  name: Shaquille O'Neal
  rank: 4
  consensusRank: 6
  era: 1990s–2000s
  teams: [Orlando Magic, Los Angeles Lakers, Miami Heat]
  accolades:
    - 4× NBA Champion
    - 3× Finals MVP
    - 1× MVP
    - 15× All-Star
  blurb: >
    Maybe the most dominant peak of all time. The main reason (along with
    LeBron) that Kobe and Duncan were rarely ever considered the best player
    in the league in any given year.

- id: duncan
  name: Tim Duncan
  rank: 5
  consensusRank: 7
  era: 2000s–2010s
  teams: [San Antonio Spurs]
  accolades:
    - 5× NBA Champion
    - 3× Finals MVP
    - 2× MVP
    - 15× All-Star
  blurb: >
    Elite longevity, ultimate team player, with an underrated peak.

- id: kobe
  name: Kobe Bryant
  rank: 6
  consensusRank: 11
  era: 2000s–2010s
  teams: [Los Angeles Lakers]
  accolades:
    - 5× NBA Champion
    - 2× Finals MVP
    - 1× MVP
    - 18× All-Star
    - 81-point game
  blurb: >
    Just behind Duncan and Shaq. Slightly dragged down due to efficiency and
    being Robin to Shaq's Batman.

- id: bird
  name: Larry Bird
  rank: 7
  consensusRank: 8
  era: 1980s
  teams: [Boston Celtics]
  accolades:
    - 3× NBA Champion
    - 2× Finals MVP
    - 3× MVP
    - 12× All-Star
  blurb: >
    Gets the edge over Magic thanks to lesser teams. Better defender and a
    shooter ahead of his time.

- id: magic
  name: Magic Johnson
  rank: 8
  consensusRank: 4
  era: 1980s
  teams: [Los Angeles Lakers]
  accolades:
    - 5× NBA Champion
    - 3× Finals MVP
    - 3× MVP
    - 12× All-Star
  blurb: >
    Bird gets the edge — he didn't have Kareem and Worthy. But arguably the
    best passer of all time and a true Swiss army knife.

- id: russell
  name: Bill Russell
  rank: 9
